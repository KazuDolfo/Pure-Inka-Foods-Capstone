<div class="admin-container">
  
  
  <header class="admin-mobile-header d-lg-none">
    <button class="btn-toggle-sidebar" (click)="toggleSidebar()">
      <i class="bi bi-list fs-2"></i>
    </button>
    <div class="mobile-logo-area">
      <img src="assets/pure-inka-logo.png" alt="Pure Inka" width="30" height="30" class="rounded-circle bg-white">
      <span class="fw-bold ms-2">Admin Panel</span>
    </div>
    <div style="width: 44px;"></div> 
  </header>

  <div class="admin-layout">
    
    <aside class="admin-sidebar" [class.open]="isSidebarOpen()">
      <div class="sidebar-header d-none d-lg-flex">
        <a [routerLink]="['/']" class="sidebar-brand">
          <img src="assets/pure-inka-logo.png" alt="Pure Inka" width="40" height="40" class="rounded-circle bg-white">
          <span class="fs-4 fw-bold text-white ms-2">Admin Panel</span>
        </a>
      </div>

      <div class="sidebar-mobile-header d-lg-none">
        <span class="fw-bold text-white">Menú Administrativo</span>
        <button class="btn-close-sidebar" (click)="closeSidebar()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <ul class="nav nav-pills flex-column mb-auto px-3">
          <li class="nav-item">
            <a [routerLink]="['/admin/dashboard']" class="nav-link" routerLinkActive="active" (click)="closeSidebar()">
              <i class="bi bi-speedometer2 me-3"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a [routerLink]="['/admin/products']" class="nav-link" routerLinkActive="active" (click)="closeSidebar()">
              <i class="bi bi-box-seam me-3"></i>
              <span>Productos</span>
            </a>
          </li>
          <li>
            <a [routerLink]="['/admin/orders']" class="nav-link" routerLinkActive="active" (click)="closeSidebar()">
              <i class="bi bi-cart-check me-3"></i>
              <span>Pedidos</span>
            </a>
          </li>
          <li>
            <a [routerLink]="['/admin/messages']" class="nav-link" routerLinkActive="active" (click)="closeSidebar()">
              <i class="bi bi-chat-left-text me-3"></i>
              <span>Mensajes</span>
            </a>
          </li>
          <li class="mt-4 pt-4 border-top border-secondary">
            <a [routerLink]="['/']" class="nav-link text-white-50">
              <i class="bi bi-arrow-left-circle me-3"></i>
              <span>Ir a la Tienda</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer p-3">
        <button (click)="logout()" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2 rounded-pill fw-bold">
          <i class="bi bi-box-arrow-right"></i>
          <span>CERRAR SESIÓN</span>
        </button>
      </div>
    </aside>

    
    <main class="admin-main-content">
      <div class="content-wrapper p-3 p-md-4">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  
  <div class="admin-overlay d-lg-none" [class.show]="isSidebarOpen()" (click)="closeSidebar()"></div>
</div>
