<div class="d-flex">
  <div class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark" style="width: 280px; min-height: 100vh;">
    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
      <img src="assets/pure-inka-logo.png" alt="Pure Inka" width="40" height="40" class="me-2 rounded-circle bg-white">
      <span class="fs-4 fw-bold">Admin Panel</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a [routerLink]="['/admin/dashboard']" class="nav-link text-white" routerLinkActive="active">
          <i class="bi bi-speedometer2 me-2"></i>
          Dashboard
        </a>
      </li>
      <li>
        <a [routerLink]="['/admin/products']" class="nav-link text-white" routerLinkActive="active">
          <i class="bi bi-box-seam me-2"></i>
          Productos
        </a>
      </li>
      <li>
        <a [routerLink]="['/admin/orders']" class="nav-link text-white" routerLinkActive="active">
          <i class="bi bi-cart-check me-2"></i>
          Pedidos
        </a>
      </li>
      <li>
        <a [routerLink]="['/admin/messages']" class="nav-link text-white" routerLinkActive="active">
          <i class="bi bi-chat-left-text me-2"></i>
          Mensajes
        </a>
      </li>
    </ul>
    <hr>
    <div class="dropdown">
      <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-person-circle fs-4 me-2"></i>
        <strong>Admin</strong>
      </a>
      <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
        <li><a class="dropdown-item" href="/">Ir a Tienda</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="/auth">Cerrar Sesión</a></li>
      </ul>
    </div>
  </div>

  <div class="flex-grow-1 p-4 bg-light" style="height: 100vh; overflow-y: auto;">
    <router-outlet></router-outlet>
  </div>
</div>
